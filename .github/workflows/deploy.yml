name: Deploy Aetheria Voxel to GitHub Pages

# Deploys via GitHub's first-party Pages artifact flow. `actions/configure-pages`
# sets the Pages source to "GitHub Actions" on every run, so the deployment can
# never silently revert to serving the raw `main` branch source. No branch to
# point at, no local tooling, no personal login — just push main.
#
# (If Pages was previously "Deploy from a branch", this flips it to Actions
# automatically on the next run.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
